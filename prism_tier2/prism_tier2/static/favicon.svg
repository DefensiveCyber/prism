<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#9b5de5"/>
      <stop offset="33%"  stop-color="#00c4e8"/>
      <stop offset="66%"  stop-color="#00e5b0"/>
      <stop offset="100%" stop-color="#38e06e"/>
    </linearGradient>
  </defs>
  <!-- Dark background pill -->
  <rect width="32" height="32" rx="7" fill="#0d1018"/>
  <!-- Prism triangle -->
  <polygon points="16,4 28,27 4,27" fill="none" stroke="url(#pg)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Refracted beams right side -->
  <line x1="23" y1="20" x2="30" y2="17" stroke="#9b5de5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="30" y2="21" stroke="#5b6cf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="30" y2="25" stroke="#00c4e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="26" x2="30" y2="29" stroke="#00e5b0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Incoming beam -->
  <line x1="2" y1="14" x2="11" y2="20" stroke="#9b5de5" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
</svg>
